<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Campus Rush，一款轻量的 2D 横版校园无尽跑酷游戏。"
    />
    <meta name="theme-color" content="#173b57" />
    <title>Campus Rush｜校园冲刺</title>
  </head>
  <body>
    <main class="app-shell">
      <div class="game-frame" aria-label="Campus Rush 游戏区域">
        <section
          class="game-loader"
          data-game-loader
          aria-label="游戏加载中"
        >
          <div class="game-loader__alarm">08:29 · 早八预警</div>
          <div class="game-loader__mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <p class="game-loader__eyebrow">CAMPUS RUSH</p>
          <h1 class="game-loader__title">校园冲刺</h1>
          <div
            class="game-loader__track"
            data-game-loader-progress
            role="progressbar"
            aria-label="游戏加载进度"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="8"
          >
            <div class="game-loader__fill">
              <span class="game-loader__runner" aria-hidden="true">→</span>
            </div>
          </div>
          <div class="game-loader__meta">
            <span data-game-loader-status>正在赶往教学楼…</span>
            <strong data-game-loader-percent>8%</strong>
          </div>
        </section>
        <div id="game"></div>
      </div>
      <nav
        class="mobile-controls"
        data-mobile-controls
        aria-label="移动端游戏操作"
        hidden
      >
        <button
          class="mobile-control mobile-control--crouch"
          type="button"
          data-action="crouch"
          aria-label="按住下蹲，空中快速下坠"
          aria-pressed="false"
        >
          <span class="mobile-control__icon" aria-hidden="true">↓</span>
          <span class="mobile-control__label">下蹲 / 下坠</span>
        </button>
        <button
          class="mobile-control mobile-control--jump"
          type="button"
          data-action="jump"
          aria-label="跳跃，再按一次二段跳"
          aria-pressed="false"
        >
          <span class="mobile-control__icon" aria-hidden="true">↑</span>
          <span class="mobile-control__label">跳跃 / 二段</span>
        </button>
      </nav>
      <p class="page-tip">斜坡与高台藏有道具大礼包 · 连续跳两次：二段跳 · 空中 ↓ / S：快速下坠 · M：声音</p>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
